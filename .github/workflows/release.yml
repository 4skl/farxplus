name: Build and Release v0.1.0

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------
  # JOB 1: BUILD WINDOWS & MACOS
  # -----------------------------------------------------------------
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os: macos-14
            artifact_name: FARxPlus-macos-arm64.zip
          - os: windows-latest
            artifact_name: FARxPlus-windows-amd64.zip

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # --- RUST SETUP & CACHE ---
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # --- MACOS SETUP & BUNDLE ---
      - name: Install GTK4 & Dylibbundler (macOS)
        if: runner.os == 'macOS'
        run: brew install gtk4 dylibbundler

      # --- WINDOWS SETUP ---
      - name: Setup MSYS2 and GTK4 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            zip

      # --- COMPILATION ---
      - name: Build Release Binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release

      - name: Build Release Binary (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: cargo build --release

      # --- MACOS PACKAGING (.app Bundle) ---
      - name: Package macOS .app Bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p FARxPlus.app/Contents/MacOS
          mkdir -p FARxPlus.app/Contents/Resources
          mkdir -p FARxPlus.app/Contents/Frameworks
          
          cp target/release/FARxPlus FARxPlus.app/Contents/MacOS/FARxPlus
          if [ -d "assets" ]; then cp -r assets/* FARxPlus.app/Contents/Resources/; fi
          
          cat <<EOF > FARxPlus.app/Contents/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>FARxPlus</string>
              <key>CFBundleIdentifier</key>
              <string>com.fourskl.farxplus</string>
              <key>CFBundleName</key>
              <string>FARxPlus</string>
              <key>CFBundleVersion</key>
              <string>0.1.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>0.1.0</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon.icns</string>
          </dict>
          </plist>
          EOF
          
          dylibbundler -od -b -x FARxPlus.app/Contents/MacOS/FARxPlus -d FARxPlus.app/Contents/Frameworks/ -p @executable_path/../Frameworks/
          zip -r ${{ matrix.artifact_name }} FARxPlus.app

      # --- WINDOWS PACKAGING ---
      - name: Bundle Windows DLLs into ZIP
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir FARxPlus-Windows
          cp target/release/FARxPlus.exe FARxPlus-Windows/FARxPlus.exe
          if [ -d "assets" ]; then cp -r assets FARxPlus-Windows/; fi
          ldd target/release/FARxPlus.exe | grep '\/ucrt64.*\.dll' -o | xargs -I{} cp "{}" FARxPlus-Windows/
          zip -r ${{ matrix.artifact_name }} FARxPlus-Windows/

      # --- UPLOAD ARTIFACTS FOR STAGING ---
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  # -----------------------------------------------------------------
  # JOB 2: BUILD LINUX APPIMAGE (Standalone)
  # -----------------------------------------------------------------
  build-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev build-essential file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --release

      - name: Setup AppDir Structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          
          # Copy Binary
          cp target/release/FARxPlus AppDir/usr/bin/FARxPlus
          
          # Copy Linux Icon (Assuming you have an SVG in assets)
          if [ -f "assets/icon.svg" ]; then 
            cp assets/icon.svg AppDir/usr/share/icons/hicolor/scalable/apps/com.fourskl.farxplus.svg
          fi
          
          # Create Desktop File
          cat <<EOF > AppDir/usr/share/applications/com.fourskl.farxplus.desktop
          [Desktop Entry]
          Name=FARxPlus
          Comment=Manage .far archives easily
          Exec=FARxPlus
          Icon=com.fourskl.farxplus
          Terminal=false
          Type=Application
          Categories=Utility;Archiving;
          EOF

      - name: Package AppImage
        env:
          OUTPUT: FARxPlus-linux-amd64.AppImage
        run: |
          # Download linuxdeploy and GTK plugin
          wget -c -nv "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -c -nv "https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          
          # Run linuxdeploy
          export UPD_INFO="gh-releases-zsync|az|FARxPlus|latest|FARxPlus-linux-amd64.AppImage.zsync"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin gtk --output appimage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FARxPlus-linux-amd64.AppImage
          path: FARxPlus-linux-amd64.AppImage

  # -----------------------------------------------------------------
  # JOB 3: PUBLISH RELEASE
  # -----------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: [build-native, build-appimage]
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}